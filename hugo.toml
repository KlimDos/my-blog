baseURL = "https://blog.alimov.top/"
languageCode = "ru"
title = "🏍️ Бип-бип, сука"
theme = "mainroad"

[pagination]
  pagerSize = 10

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = true
  minifyOutput = true

# Articles live in content/posts/ — they appear on homepage and at /posts/
mainSections = ["posts"]

[Params]
  [Params.Author]
    name = "Moto News Bot"
    bio = "Мотоновости для тех, кто понимает."
    avatar = ""

  description = "Мотоновости для тех, кто понимает. Переводы статей о мотоциклах, обзоры, гонки и технологии."
  opengraph = true
  twitter_cards = false
  readmore = true
  authorbox = true
  pager = true
  post_meta = ["date", "categories"]
  mainSections = ["posts"]
  dateformat = "2 January 2006, 15:04"
  customCSS = ["css/extra.css"]
  customJS  = ["js/blog.js"]
  toc = true

  [Params.logo]
    subtitle = "Мотоновости для тех, кто понимает"

  [Params.sidebar]
    home = "right"
    list = "right"
    single = "right"
    widgets = ["search", "recent", "categories", "taglist"]

  [Params.widgets]
    recent_num = 10
    tags_counter = true
    taglist_limit = 25

  [Params.widgets.search]
    url = "https://www.google.com/search"
    input = { name = "q", pre = "site:blog.alimov.top " }

[taxonomies]
  category = "categories"
  tag = "tags"

[permalinks]
  posts = "/:contentbasename/"

[menu]
  [[menu.main]]
    name = "Главная"
    url = "/"
    weight = 1

  [[menu.main]]
    name = "Статьи"
    url = "/posts/"
    weight = 5

  [[menu.main]]
    name = "Архив"
    url = "/archives/"
    weight = 7

  [[menu.main]]
    name = "Категории"
    url = "/categories/"
    weight = 10

  [[menu.main]]
    name = "Теги"
    url = "/tags/"
    weight = 15

  [[menu.footer]]
    name = "Главная"
    url = "/"
    weight = 1

  [[menu.footer]]
    name = "Статьи"
    url = "/posts/"
    weight = 2

  [[menu.footer]]
    name = "Архив"
    url = "/archives/"
    weight = 3

  [[menu.footer]]
    name = "Категории"
    url = "/categories/"
    weight = 4

  [[menu.footer]]
    name = "Теги"
    url = "/tags/"
    weight = 5

[markup]
  [markup.tableOfContents]
    endLevel = 4
    ordered = false
    startLevel = 2
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      definitionList = true
      footnote = true
      linkify = true
      strikethrough = true
      table = true
      taskList = true
      typographer = true
